[terminal]
# The VT to run the greeter on.
vt = 1

[default_session]
# Añadimos WLR_RENDERER_ALLOW_SOFTWARE=1 para máquinas virtuales/drivers básicos
# Añadimos WLR_NO_HARDWARE_CURSORS=1 para solucionar glitches gráficos en virtio-gpu con QEMU/KVM
# Añadimos la ruta completa para mayor seguridad
command = "env WLR_NO_HARDWARE_CURSORS=1 WLR_RENDERER_ALLOW_SOFTWARE=1 meteor -c /etc/horizon/meteor-greeter.ini"

# El usuario to run the greeter as
user = "greeter"
